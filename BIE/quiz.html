const QUESTIONS = {
"2_CPA": {
  title: "Lecture 2: Business, Government, Welfare & CPA",
  questions: [
    {type:"mc", q:"Hva er den korrekte definisjonen av Corporate Political Activity (CPA)?",
      opts:["Handlinger firmaet gjør for å maksimere sitt bidrag til sosial velferd gjennom lovendringer","Aktiviteter firmaer iverksetter for å påvirke myndigheter og deres politikk på måter som er gunstige for dem","Offentlige reguleringer som begrenser bedrifters markedsmakt og påvirker profitt","Tiltak staten gjør for å sikre at bedrifter følger lovverket og konkurransepolitikken"],
      correct:1, src:"Lecture 2, slide 24",
      expl:"CPA er en ikke-markedsstrategi der firmaer påvirker politikere/offentlige funksjonærer for å forme offentlig politikk i retning som gagner dem. Den kan virke enten gjennom bedre informasjon til beslutningstakere eller gjennom insentiver (donasjoner, goder osv.). Det handler IKKE om sosial velferd eller statlig regulering - det er bedriftens strategiske handling rettet MOT staten."},
    {type:"mc", q:"Hvilken av følgende er IKKE en typisk form for CPA-praksis nevnt i pensum?",
      opts:["Lobbying gjennom bransjeforeninger eller egne avdelinger","Finansiering av universiteter, tenketanker og eksperter","Direkte markedskonkurranse gjennom prisreduksjoner","Revolving doors - bytte mellom offentlig og privat sektor"],
      correct:2, src:"Lecture 2, slide 25-26",
      expl:"Direkte priskonkurranse er en MARKEDSSTRATEGI, ikke en ikke-markedsstrategi som CPA. CPA omfatter informasjonsaktiviteter (media, tenketanker, eksperter), lobbying (direkte og indirekte), og insentiver (revolving doors, politiske donasjoner, gaver, trusler). Husk: CPA er rettet mot politikere/myndigheter, ikke konkurrenter."},
    {type:"mc", q:"Hva menes med begrepet 'regulatory capture'?",
      opts:["Når antitrust-myndigheter fanger opp ulovlige karteller gjennom kronvitner","Når beslutningstakere slutter å tjene allmennhetens interesse fordi de påvirkes for sterkt av spesialinteresser","Når staten tar over et monopolistisk foretak for å regulere det bedre","Når konkurrenter inngår formelle avtaler om prissetting og markedsdeling"],
      correct:1, src:"Lecture 2, slide 24",
      expl:"Regulatory capture er et synonym for CPA brukt med en negativ tone. Det refererer til når etablerte aktører (monopolister) og andre spesialinteressegrupper påvirker beslutningstakere i så stor grad at disse slutter å tjene allmennhetens interesse. Det er IKKE kartellsamarbeid (det er antitrust), IKKE statsovertakelse, og IKKE oppdagelse av karteller."},
    {type:"mc", q:"Hvilke to betingelser må være oppfylt for at CPA skal være akseptabel i markedsøkonomier og demokratier?",
      opts:["Effektivitet og økonomisk bærekraft","Gjennomsiktighet og ansvarlighet","Profittmaksimering og velferdsoptimering","Konkurranse og differensiering"],
      correct:1, src:"Lecture 2, slide 27",
      expl:"CPA (med unntak av bestikkelser og trusler som aldri er akseptable) er akseptabel hvis: (1) Gjennomsiktighet (transparency) - rettferdig informasjon om forretningsinteraksjoner med beslutningstakere, sikret gjennom lov/reguleringer (f.eks. lobbyregistre) eller sivilsamfunnspress (media, NGOer); og (2) Ansvarlighet (accountability) - politikere, beslutningstakere og forretningsfolk må stå til ansvar overfor offentligheten og institusjoner."},
    {type:"mc", q:"Hvorfor kan offentlige politikker mot markedssvikt være utilstrekkelige?",
      opts:["Fordi markeder alltid korrigerer seg selv uten statlig inngripen","På grunn av myndighetsfeil (informasjonsasymmetri, svake kompetanser) OG selvinteressert bedriftspåvirkning (CPA)","Fordi offentlige tjenestemenn alltid er fullt informert om industrien","Fordi markedssvikt aldri finnes i moderne økonomier"],
      correct:1, src:"Lecture 2, slide 23",
      expl:"To hovedgrunner: (1) Myndighetsfeil - beslutningstakere lider av informasjonsasymmetri og har ofte svake kompetanser om industri, innovasjon osv. (2) CPA - firmaer påvirker politikken til egen fordel. Dette betyr IKKE at markeder alltid korrigerer seg selv - markedssvikt finnes og trenger offentlig intervensjon, men intervensjonen kan selv svikte."},
    {type:"mc", q:"Hva er sosial velferd (Social Welfare) som indikator i BIE-rammeverket?",
      opts:["Statens samlede skatteinntekter fra bedrifter og husholdninger per år","En indikator for å måle verdien skapt av bedriften for seg selv og sine kunder (samlet økonomisk effektivitet)","Antallet arbeidsplasser en bedrift skaper i et lokalsamfunn","Summen av bedriftens CSR-investeringer og miljøtiltak i et gitt år"],
      correct:1, src:"Lecture 2, slide 2",
      expl:"Social Welfare i BIE-kurset er en indikator på den samlede økonomiske effektiviteten - verdien som skapes av bedriften for seg selv (produsentoverskudd) OG for kundene (konsumentoverskudd). Når bedrifter ikke klarer å skape tilstrekkelig effektivitet (markedssvikt), intervenerer staten gjennom offentlig politikk."},
    {type:"mc", q:"Hvilken markedssvikt adresseres primært av antitrust-politikk?",
      opts:["Naturlige monopoler og skaleøkonomi i infrastruktur","Miljøeksternaliteter og klimagassutslipp","Misbrukende markedsmakt og konkurransebegrensende atferd","Informasjonsasymmetri og adverse selection"],
      correct:2, src:"Lecture 2 / Lecture 15",
      expl:"Antitrust/konkurransepolitikk adresserer hovedsakelig 'abusive market power' - misbruk av dominerende stilling, konkurransebegrensende avtaler (karteller) og fusjonskontroll. Naturlig monopol håndteres av SOEs/regulering. Miljøeksternaliteter av miljøpolitikk. Informasjonsasymmetri av ulike markeds- og politikkløsninger."},
    {type:"text", q:"Forklar kort forskjellen mellom 'Public policy toward business' og 'Corporate Political Activity (CPA)'. Inkluder retningen av påvirkningen.",
      keywords:["public policy","CPA","government","business","influence","market failure","restore","favorable"],
      src:"Lecture 2, slide 2-3",
      expl:"Godt svar bør inneholde:\n\n• **Public policy toward business**: Myndighetenes intervensjon RETTET MOT bedrifter for å gjenopprette sosial velferd når markedet svikter. Retning: Stat → Bedrift.\n\n• **CPA (Corporate Political Activity)**: Bedriftens handlinger RETTET MOT myndighetene for å påvirke politikk og beskytte egen profitt. Retning: Bedrift → Stat.\n\nDe to er altså motsatte retninger av påvirkning i samme forhold. Public policy er korrigerende (reaktiv mot markedssvikt), mens CPA er strategisk (proaktiv for egen profitt)."},
    {type:"mc", q:"Hvilken av disse er en 'informasjonsaktivitet' innenfor CPA?",
      opts:["Direkte finansielle bidrag til politiske kampanjer og kandidater","Finansiering av tenketanker og eksperter som kan gi kunnskap om politiske spørsmål","Bestikkelser til offentlige tjenestemenn for å påvirke vedtak","Trusler mot beslutningstakere for å avstå fra bestemte vedtak"],
      correct:1, src:"Lecture 2, slide 26",
      expl:"Informasjonsaktiviteter innen CPA handler om å forme debatten gjennom kunnskap: media-tilstedeværelse, finansiering av universiteter/tenketanker/eksperter, deltakelse i rådgivende organer. Politiske bidrag og bestikkelser/trusler er 'insentiver' - en separat kategori."},
    {type:"mc", q:"Hvorfor er CPA-regulering mer problematisk i kontekster med 'institutional void'?",
      opts:["Fordi bedrifter ikke har ressurser til lobbying der","Fordi svake formelle og uformelle institusjoner gjør gjennomsiktighet og ansvarlighet vanskelig","Fordi det alltid er bedre konkurranse i slike markeder","Fordi staten er sterkere og mer regulerende i slike kontekster"],
      correct:1, src:"Lecture 2, slide 27",
      expl:"Institutional void refererer til svake formelle institusjoner (lover, reguleringer, rettssystem) og uformelle institusjoner (normer, tillit). Uten disse blir det vanskelig å sikre gjennomsiktighet og ansvarlighet. CPA kan da lettere degenerere til korrupsjon uten kontroll."},
    {type:"mc", q:"Hvilken av disse handlingene er (nesten) universelt forbudt uansett CPA-kontekst?",
      opts:["Deltakelse i åpne høringer og offentlige konsultasjonsprosesser","Finansiering av bransjeforeninger som driver lobbying","Bestikkelser og direkte trusler mot politikere","Finansielle bidrag til politiske partier innenfor lovlige rammer"],
      correct:2, src:"Lecture 2, slide 27",
      expl:"Bestikkelser og trusler er forbudt (nesten) overalt. Andre CPA-former er akseptable SÅ LENGE betingelsene om gjennomsiktighet og ansvarlighet er oppfylt - de er altså betinget akseptable, mens bestikkelser/trusler aldri er det."},
    {type:"text", q:"Hva er forskjellen mellom direkte og indirekte lobbying? Gi ett eksempel på hver.",
      keywords:["direct","indirect","government affairs","industry associations","lobbying firms","public relations"],
      src:"Lecture 2, slide 26",
      expl:"**Direkte lobbying**: Bedriften påvirker politikere direkte gjennom sine egne avdelinger (f.eks. government affairs-avdeling, PR-avdeling).\n\n**Indirekte lobbying**: Bedriften bruker mellomledd - bransjeforeninger, profesjonelle lobbyfirmaer, PR-byråer, advokatfirmaer.\n\nEksempel direkte: Googles eget 'Government Affairs'-team møter politikere.\nEksempel indirekte: Et bilselskap bruker ACEA (europeisk bransjeforening) for å påvirke EU-politikk."},
    {type:"mc", q:"Hvilken markedssvikt kobles TYPISK til industriell og innovasjonspolitikk?",
      opts:["Misbruk av markedsmakt gjennom rovprising","Miljøeksternaliteter ved produksjon","Markedssvikter som hindrer økonomisk vekst","Naturlige monopoler i infrastruktur"],
      correct:2, src:"Lecture 2, slide 22",
      expl:"Industriell og innovasjonspolitikk retter seg mot markedssvikter som hindrer økonomisk vekst (f.eks. underinvestering i FoU, koordineringssvikt, spillover-problemer). Misbruk av makt er antitrust. Miljøeksternaliteter er miljøpolitikk. Naturlig monopol er regulering/SOEs."},
    {type:"mc", q:"Ved et 'revolving door'-scenario, hva er hovedbekymringen?",
      opts:["At talent forlater offentlig sektor","At personer som bytter mellom offentlig og privat sektor kan utnytte sine forbindelser og insiderkunnskap","At statsansatte får for høye pensjoner","At private bedrifter ikke får nok erfarne ansatte"],
      correct:1, src:"Lecture 2, slide 25",
      expl:"Revolving door-bekymringen er at personer som veksler mellom offentlig og privat sektor kan skape interessekonflikter: de kan utnytte sine politiske forbindelser og innsideinformasjon for å tjene private interesser, eller love fremtidige jobber til offentlig ansatte som belønning for gunstige beslutninger."},
    {type:"mc", q:"Hvilket av følgende er IKKE en del av BIE-rammeverket Business/Government/Market/Society?",
      opts:["Myndighetenes regulering av monopoler","Bedriftens samhandling med sivilsamfunnsorganisasjoner","Forbrukerens individuelle nyttemaksimering i isolerte kjøpsbeslutninger","Bedriftens påvirkning på politikken gjennom CPA"],
      correct:2, src:"Lecture 1",
      expl:"BIE-rammeverket ser på Business i sammenheng med Market, Government, Natural Environment og Society. Individuell forbrukeratferd isolert er mer mikroøkonomi/marketing. Regulering, CSO-samhandling og CPA er alle sentrale i BIE-rammeverket."},
  ]
},
"3_InfoAsym": {
  title: "Lecture 3: Information Asymmetries",
  questions: [
    {type:"mc", q:"Hva er hovedforskjellen mellom adverse selection og moral hazard?",
      opts:["Adverse selection handler om skjulte handlinger etter avtale, moral hazard om skjulte egenskaper før avtale","Adverse selection handler om skjulte egenskaper før transaksjonen (ex-ante), moral hazard om skjulte handlinger etter transaksjonen (ex-post)","Begge handler om samme problem men med ulike navn","Adverse selection gjelder forbrukere, moral hazard gjelder kun bedrifter"],
      correct:1, src:"Lecture 3",
      expl:"Adverse selection = hidden information = ex-ante asymmetri. En part kjenner ikke egenskapene til den andre FØR transaksjonen (f.eks. kvalitet på brukt bil).\n\nMoral hazard = hidden action = ex-post asymmetri. En part kan ikke observere den andres handlinger ETTER/UNDER transaksjonen (f.eks. hvor forsiktig en forsikret kunde er).\n\nBegge er informasjonsasymmetrier, men tidspunktet og problemets natur er forskjellig."},
    {type:"mc", q:"I 'Market for Lemons'-modellen, hva skjer når kjøpere ikke kan verifisere kvalitet?",
      opts:["Prisen går opp slik at bare plums selges i markedet","Kjøpere betaler forventet verdi, plums forsvinner fra markedet, kun lemons selges","Selgere avslører sannheten fordi det lønner seg for alle","Markedet fungerer perfekt siden 50/50-fordelingen løser asymmetri"],
      correct:1, src:"Lecture 3, Market for lemons model",
      expl:"Med 50/50 fordeling vil kjøperen være villig til å betale forventet verdi (EV) = 0.5×1200 + 0.5×2400 = $1,800. Men plum-eiere krever minst $2,000 for å selge. Bare lemon-eiere (som krever $1,000) vil selge. Over tid innser kjøpere at kun lemons tilbys, og prisen faller til mellom $1,000-$1,200. Plums drives ut av markedet - en klassisk markedssvikt."},
    {type:"mc", q:"I lemons-modellen: hvilken minimumsandel q av plums må finnes i markedet for at plums skal fortsette å bli solgt?",
      opts:["q ≥ 1/3","q ≥ 1/2","q ≥ 2/3","q ≥ 3/4"],
      correct:2, src:"Lecture 3, Quality determination",
      expl:"Betingelsen er: wtp = 1200(1-q) + 2400q ≥ 2000.\n\nLøser for q:\n1200 - 1200q + 2400q ≥ 2000\n1200 + 1200q ≥ 2000\n1200q ≥ 800\nq ≥ 2/3\n\nSå hvis minst 2/3 av kjøretøyene er plums, vil gjennomsnittlig forventet verdi være høy nok til at plum-eiere får solgt."},
    {type:"mc", q:"Hvilket begrep beskriver BEST problemet til en forsikringskunde som blir mer uforsiktig ETTER å ha kjøpt forsikring?",
      opts:["Adverse selection fordi kjøperen har skjult informasjon om sin risiko","Moral hazard fordi atferden endres når den ikke kan observeres","Signaling fordi kunden sender et signal om sin type","Screening fordi forsikringsselskapet velger kunder"],
      correct:1, src:"Lecture 3, Moral hazard",
      expl:"Dette er klassisk moral hazard - skjult handling etter transaksjonen. Kunden kjenner sin risiko fra før (det ville vært adverse selection), men det nye problemet er ATFERDSENDRINGEN som oppstår etter kjøpet, fordi forsikringsselskapet ikke kan observere hvor forsiktig kunden oppfører seg."},
    {type:"mc", q:"Hva er hovedegenskapen til et effektivt signal i en signaling-modell?",
      opts:["Det må være gratis å sende slik at alle kan signalisere likt","Det må være observerbart, og mer kostbart for dem med dårligere skjulte egenskaper","Det må være usynlig for mottakeren","Det må være påkrevd ved lov"],
      correct:1, src:"Lecture 3, Signaling",
      expl:"Et troverdig signal må være: (1) Observerbart, (2) Kostbart - ellers er det 'cheap talk', (3) Differensielt kostbart - mer kostbart for typer med dårligere egenskaper. Bare da skiller signalet seg, ved at kun høykvalitets-typer finner det lønnsomt å signalisere."},
    {type:"mc", q:"Hvilken av disse er et eksempel på screening?",
      opts:["Selger gir garanti på produktet","Forsikringsselskap utfører medisinske undersøkelser og spørreskjemaer","Staten innfører merkingsregler","Universiteter gir vitnemål etter eksamen"],
      correct:1, src:"Lecture 3, Adverse selection remedies",
      expl:"Screening = den MINDRE informerte parten prøver å skille mellom typer (her: forsikringsselskapet prøver å finne risikoen til kundene) gjennom verifikasjoner, medisinske undersøkelser, spørreskjemaer osv.\n\nSignaling = den MER informerte parten avslører sin type (garanti fra selger, vitnemål fra student)."},
    {type:"text", q:"Forklar hvorfor restauranter i turistområder er spesielt utsatt for adverse selection. Nevn minst ett remedie.",
      keywords:["tourist","repeat","one-time","quality","reviews","reputation","word-of-mouth"],
      src:"Lecture 3, Adverse selection examples and remedies",
      expl:"**Problemet**: Turister er som regel engangskunder. Dette fjerner den viktigste disiplineringsmekanismen (repeat business/reputasjon). Restauranten har insentiv til å selge lav kvalitet (lemon) til høy pris fordi kunden ikke oppdager problemet før etter måltidet, og kan ikke straffe restauranten.\n\n**Remedies**: (1) Media-anmeldelser og profesjonelle kritikere; (2) Online reviews (Tripadvisor); (3) Reputasjonsbygging gjennom Michelin-stjerner; (4) Tilknytning til kjente kjeder."},
    {type:"mc", q:"Hva er IKKE et typisk eksempel på hidden information (adverse selection)?",
      opts:["Kvaliteten på en brukt bil som selgeren kjenner bedre enn kjøperen","En leder som slakker av på jobb når ingen observerer ham","Helsetilstanden til en forsikringskunde","Kostnadene til en sittende bedrift som en potensiell entrant ikke kan observere"],
      correct:1, src:"Lecture 3",
      expl:"En leder som slakker av (hidden action/ex-post) er MORAL HAZARD - et klassisk agency-problem. De tre andre er alle eksempler på adverse selection: egenskaper som eksisterer før transaksjonen, skjult for den ene parten."},
    {type:"mc", q:"Hvilken løsning er mest passende for moral hazard-problemer?",
      opts:["Signalering gjennom garantier og sertifiseringer","Insentivjustering - f.eks. kontrakter som binder belønning til observerbare utfall","Mer informasjon via merkingsregler","Pooling-strategier"],
      correct:1, src:"Lecture 3, Moral hazard",
      expl:"Hovedløsningen for moral hazard er incentive alignment - få agentens insentiver til å matche prinsipalens gjennom kontrakter som belønner observerbare resultater. Eksempel: Resultatbonus, aksjer til ledelse, egenandel i forsikring.\n\nSignaling, merking og pooling er alle tiltak mot ADVERSE SELECTION."},
    {type:"mc", q:"I eksamensoppgaven om 'consumers of live entertainment', hva var korrekte svar?",
      opts:["Hovedproblemet er moral hazard, løses ved at non-profit organisasjoner arrangerer","Hovedproblemet er adverse selection, kan mitigeres gjennom anmeldelser fra profesjonelle kritikere","Hovedproblemet er moral hazard, løses ved å tilby venuene en andel av billettinntekter","Hovedproblemet er adverse selection, kan mitigeres ved statlig makt til å beskatte"],
      correct:1, src:"BIE_MS_Forms_9_September_2020 - Solution",

    {type:"mc", q:"Hvilket av følgende markeder har IKKE et klassisk adverse selection-problem?",

"5_PriceDiscrim": {
  title: "Lecture 5: Price Discrimination",
  questions: [
    {type:"mc", q:"Hvilken grunnbetingelse er en forutsetning for å gjennomføre prisdiskriminering?",
      opts:["Perfekt konkurranse slik at alle priser er like MC","Fravær av arbitrage, slik at kunder ikke kan kjøpe billig og selge dyrt videre","Homogene produkter uten differensiering","Full likhet i betalingsvillighet blant alle kundene"],
      correct:1, src:"Lecture 5, Keywords slide 42",
      expl:"Fravær av arbitrage er kritisk: hvis kunder kan kjøpe varen billig og videreselge til høyere pris, brytes prisdiskrimineringen ned. Prisdiskriminering krever også MARKEDSMAKT (ikke perfekt konkurranse) og forskjeller i betalingsvillighet."},
    {type:"mc", q:"Hva kjennetegner Perfect Price Discrimination (PPD / first degree)?",
      opts:["Samme pris for alle kunder","Firmaet setter ulik pris for hver kunde lik deres betalingsvillighet (WTP)","Firmaet deler markedet i 2-3 grupper med fast pris per gruppe","Firmaet tilbyr ulike versjoner og lar kundene velge selv"],
      correct:1, src:"Lecture 5, slide 15",
      expl:"PPD = 1st degree: firmaet klarer å ta ut hele konsumentoverskuddet ved å sette en unik pris for hver kunde lik deres WTP. Sjeldent i praksis. De andre er GPD (3rd) og PDSS (2nd)."},
    {type:"mc", q:"Hva er kjennetegnet ved Group Price Discrimination (GPD / third degree)?",
      opts:["Hver kunde betaler sin individuelle WTP","Firmaet deler markedet i OBSERVERBARE grupper og setter ulik pris per gruppe","Firmaet kjenner ikke kundenes type","Alle kunder betaler monopolprisen"],
      correct:1, src:"Lecture 5, slide 26",
      expl:"GPD krever at firmaet kan OBSERVERE karakteristika: alder, nasjonalitet, lokasjon, yrke osv. Firmaet setter monopolpris i hvert segment. Høyere pris i segmenter med LAVERE elastisitet."},
    {type:"mc", q:"Hva er kjennetegnet ved Price Discrimination by Self-Selection (PDSS)?",
      opts:["Firmaet observerer kundetype direkte","Firmaet kan IKKE observere kundetype, tilbyr ulike versjoner og lar kundene velge","Firmaet setter samme pris men begrenser kvantum","Firmaet bruker auksjoner"],
      correct:1, src:"Lecture 5, slide 31",
      expl:"PDSS (2nd degree) brukes når firmaet lider av INFORMASJONSASYMMETRI. Løsningen er å tilby ulike VERSJONER og la kundene selvselektere. Krever participation constraint og incentive compatibility constraint."},
    {type:"calc", q:"Regneoppgave (PPD vs. monopol):\n\nEn monopolist har etterspørsel Q = 120 − 2p og marginal kostnad MC = 40.\n\nBeregn produsentoverskudd (vπ), konsumentoverskudd (CS) og social welfare (W) i:\n(a) single-price monopolist\n(b) perfect price discrimination",
      src:"Exercise 1 - Price Discrimination",
      expl:"**Formler fra pensum:**\n• Invers etterspørsel: p = 60 − 0.5q (fra Q = 120 − 2p)\n• Monopol: MR = MC gir optimal Q\n• PPD: selger til p = MC\n• CS = triangel over prislinjen under etterspørselskurven\n\n**STEG 1 — Single-price monopol (a):**\nFra Q = 120 − 2p får vi p = 60 − 0.5q\nR = p·q = 60q − 0.5q²\nMR = 60 − q\nSett MR = MC: 60 − q = 40 → **q_M = 20**\nPris: p_M = 60 − 0.5(20) = **50**\nvπ: (50−40)·20 = **200**\nCS: ½·(60−50)·20 = **100**\nW_M = 200 + 100 = **300**\n\n**STEG 2 — Perfect Price Discrimination (b):**\n60 − 0.5q = 40 → **q_PPD = 40**\nCS_PPD = 0 (alle betaler WTP)\nvπ_PPD = ½·(60−40)·40 = **400**\nW_PPD = **400**\n\n**Fasit:**\n(a) q=20, p=50, vπ=200, CS=100, W=300\n(b) q=40, vπ=400, CS=0, W=400\n\nPPD gir høyere velferd (400>300), men hele overskuddet går til produsenten."},
    {type:"calc", q:"Regneoppgave (GPD):\n\nMonopolist i to markeder:\nQ1 = 100 − p1\nQ2 = 100 − 2p2\nMC = 20\n\n(a) Pris og kvantum i hvert marked under GPD?\n(b) Hvilken uniform pris hvis lik pris i begge?",
      src:"Exercise 2 - Price Discrimination",
      expl:"**Formler:**\n• Invers: p_i = p_i(Q_i)\n• Per marked: MR_i = MC\n\n**STEG 1 — Invers demand:**\np1 = 100 − Q1\np2 = 50 − 0.5Q2\n\n**STEG 2 — GPD:**\n*Marked 1:* R1 = (100−Q1)Q1, MR1 = 100−2Q1\n100−2Q1 = 20 → **Q1 = 40, p1 = 60**\n\n*Marked 2:* R2 = (50−0.5Q2)Q2, MR2 = 50−Q2\n50−Q2 = 20 → **Q2 = 30, p2 = 35**\n\n**STEG 3 — Uniform:**\nQ = Q1+Q2 = 200−3p\np = 200/3 − Q/3\nMR = 200/3 − (2/3)Q\nSett = 20: (2/3)Q = 140/3 → **Q = 70**\np = 200/3 − 70/3 = **130/3 ≈ 43.33**\n\n**Fasit:**\n(a) p1=60/Q1=40 | p2=35/Q2=30\n(b) p≈43.33, Q=70\n\nI mer elastisk marked (Q2) er prisen lavere."},
    {type:"mc", q:"I GPD-modellen: hvordan relaterer prismarkup seg til priselastisitet?",
      opts:["Høyere elastisitet → høyere markup og pris","Lavere elastisitet → høyere markup og pris","Elastisitet påvirker ikke markup","Markup avhenger kun av MC"],
      correct:1, src:"Lecture 5, slide 23",
      expl:"Fra first-order condition: (p − MC)/p = 1/|ε|\n\nJo mer RIGID etterspørselen er (lav elastisitet), desto høyere markup. Intuitivt: når kundene er lidenskapelige/lite prisfølsomme, kan firmaet sette høyere pris uten å miste dem."},
    {type:"calc", q:"Regneoppgave (PDSS / Versioning):\n\nTuristresort, to segmenter:\n- Høy (H): 1,000 personer. WTP(N)=1500 €/uke. WTP(B)=800.\n- Lav (L): 2,000 personer. WTP(N)=600. WTP(B)=500.\n\nMC = 300 €/uke begge versjoner.\n\nEr prisdiskriminering lønnsomt? Optimal policy?",
      src:"Exercise 3 - Price Discrimination",
      expl:"**PDSS** siden typer ikke observerbart.\n\n**Formler:**\n• p_L = wtp(L,L)\n• p_H = min{wtp(H,H); p_L + (wtp(H,H) − wtp(H,L))}\n\n**STEG 1 — Uten versjonering:**\n*1a: p_N=1500*: Kun H. Profitt=(1500−300)·1000=**1.200.000**\n*1b: p_N=600*: Alle. Profitt=(600−300)·3000=**900.000**\n*1c: p_B=800*: Kun H. Profitt=(800−300)·1000=**500.000**\n*1d: p_B=500*: Alle. Profitt=(500−300)·3000=**600.000**\nBest: **1.200.000 €**\n\n**STEG 2 — Versjonering (PDSS):**\nPris for B (låser L): p_B = WTP(L,B) = **500 €**\nPris for N (IC for H):\n- Ekstrem: WTP(H,N) = 1500\n- Mild: 500 + (1500−800) = **1200**\np_N = min(1500, 1200) = **1200 €**\n\nProfitt_H = (1200−300)·1000 = 900.000\nProfitt_L = (500−300)·2000 = 400.000\n**Total = 1.300.000 €**\n\n**Fasit**: Versjonering lønnsomt (1.300.000 > 1.200.000). Gevinst: 100.000 €.\nOptimal: p_N=1200, p_B=500."},
    {type:"mc", q:"Hva er 'participation constraint' i PDSS?",
      opts:["Bedriften tjener penger på hver enhet","Hver kundetype får positiv nytte av å kjøpe sin versjon","Konkurrenter kan ikke kopiere strategien","Arbitrage hindres mellom segmenter"],
      correct:1, src:"Lecture 5, slide 34-35",
      expl:"Participation constraint: hver kundetype må oppnå minst like god nytte av å kjøpe som av ikke å kjøpe. For lav-type: WTP(L,L) − p_L ≥ 0. For høy-type: WTP(H,H) − p_H ≥ 0."},
    {type:"mc", q:"Hva er 'incentive compatibility constraint' i PDSS?",
      opts:["At begge typer deltar","At hver kundetype foretrekker sin tiltenkte versjon fremfor den andre","At bedriften ikke går konkurs","At MC er lavere enn pris for begge"],
      correct:1, src:"Lecture 5, slide 35",
      expl:"IC sikrer self-selection: at høy-type velger høy-versjonen og lav-type velger lav-versjonen. Kritisk for H-type: WTP(H,H) − p_H ≥ WTP(H,L) − p_L. Derfor: p_H = min{WTP(H,H); p_L + (WTP(H,H) − WTP(H,L))}."},
    {type:"mc", q:"I GPD hvor elastisiteten er høyest i gruppe X og lavest i Y, hvilket prismønster forventes?",
      opts:["p_X > p_Y fordi X er mer elastisk","p_Y > p_X fordi Y er mindre elastisk","p_X = p_Y fordi arbitrage utjevner","p = MC i begge markeder"],
      correct:1, src:"Lecture 5, slide 23",
      expl:"I GPD settes høyere pris i segmenter med LAVERE elastisitet. Hvis Y har lavere elastisitet, så er 1/|ε_Y| > 1/|ε_X|, dermed p_Y > p_X."},
    {type:"mc", q:"Hva er 'product damage practices' i prisdiskriminering?",
      opts:["Firmaet ødelegger konkurrenters produkter","Firmaet lager en bevisst dårligere versjon for å støtte PDSS","Produktet blir ødelagt under transport","Firmaet trekker produkter tilbake"],
      correct:1, src:"Lecture 5, keywords",
      expl:"Product damage = bevisst å lage en 'dårligere' versjon ved å strippe funksjoner. Formålet: få H-type til å VELGE høy-versjonen (IC-betingelse). Eksempel: programvare med funksjoner deaktivert, flyselskap med R-restricted vs NR-billetter."},
    {type:"mc", q:"Hvilken PD krever MINST informasjon om individuelle kunder?",
      opts:["PPD","GPD","PDSS","Uniform monopolpris"],
      correct:2, src:"Lecture 5",
      expl:"PPD krever MEST (individuell WTP). GPD krever OBSERVERBARE grupper. PDSS krever MINST om individer - bedriften vet bare at det finnes ulike typer. Kundene selvselekterer og avslører sin type."},
    {type:"text", q:"Hvorfor er 'absence of arbitrage' en forutsetning for PD? Gi ett eksempel på et marked der betingelsen er oppfylt.",

"6_Oligopoly": {

    {type:"mc", q:"Hva er Cournot-Nash-likevekt?",
      opts:["Firmaene samarbeider","Hvert firma maksimerer profitt gitt andres kvantum fast; ingen vil avvike unilateralt","Pris = MC","Leder-følger med observasjon"],
      correct:1, src:"Lecture 6",
      expl:"I en Cournot-Nash-likevekt produserer begge firmaer et nivå slik at INGEN har insentiv til å endre sitt output ENSIDIG. Skjæringspunkt mellom de to reaksjonsfunksjonene."},
    {type:"calc", q:"Regneoppgave (Cournot symmetrisk):\n\nTo firmaer, MC1=MC2=25, P=100−Q.\n\n(a) Reaksjonsfunksjoner.\n(b) Likevektspris, kvantum, profitt.\n(c) Sammenlign med p.k. og monopol.",
      src:"Exercise 1 - Oligopolistic markets",
      expl:"**Formler:**\n• π_i = (a−b·Q)·q_i − c·q_i\n• Reaksjonsfunksjon: q_i = (a−c)/(2b) − q_j/2\n• Symmetrisk: q_i = (a−c)/(3b)\n\n**STEG 1 — Reaksjonsfunksjoner:**\nπ1 = (100−q1−q2)q1 − 25q1\ndπ1/dq1 = 100 − 2q1 − q2 − 25 = 0\n**q1 = 37.5 − q2/2**\n**q2 = 37.5 − q1/2**\n\n**STEG 2 — Likevekt:**\nq1 = 37.5 − (37.5−q1/2)/2 = 18.75 + q1/4\n(3/4)q1 = 18.75 → **q1 = q2 = 25**\nQ = 50, P = 100−50 = **50**\nπ = (50−25)·25 = **625** per firma\n\n**STEG 3 — Sammenligning:**\n*P.k.: p=MC*: 25 = 100−Q → Q=75, P=25, π=0\n*Monopol: MR=MC*: 100−2Q=25 → Q=37.5, P=62.5, π=1406.25\n\n**Fasit:**\n• Cournot: P=50, Q=50, π=625 hver\n• P.k.: P=25, Q=75, π=0\n• Monopol: P=62.5, Q=37.5, π=1406.25\n\nDuopol ligger mellom p.k. og monopol."},
    {type:"mc", q:"I symmetrisk Cournot-duopol P=a−bQ, MC=c, hva er totalt kvantum?",
      opts:["(a−c)/(3b)","(a−c)/(2b)","2(a−c)/(3b)","(a−c)/b"],
      correct:2, src:"Lecture 6",
      expl:"Per firma: q_i = (a−c)/(3b). Totalt duopol: Q = 2(a−c)/(3b).\n\nMerk: (a−c)/b er p.k.-kvantum, (a−c)/(2b) er monopol. Cournot produserer 2/3 av p.k., som er 4/3 av monopol."},
    {type:"mc", q:"Hva er 'first-mover advantage' i Stackelberg?",
      opts:["Lederen betaler høyere kostnader","Lederen produserer mer og tjener mer enn følgeren, selv ved identiske firmaer","Lederen velger pris, følgeren tilpasser","Følgeren tjener alltid mer"],
      correct:1, src:"Lecture 6 - Stackelberg",
      expl:"Lederen velger q FØRST, så følgeren. Lederen vet at følgeren reagerer langs sin reaksjonsfunksjon, og velger punktet som maksimerer egen profitt. Utfall: q1^S > q2^S, π1^S > π2^S."},
    {type:"mc", q:"Hvordan sammenligner total Stackelberg-output seg med Cournot ved symmetriske firmaer?",
      opts:["Q^S < Q^C","Q^S = Q^C","Q^S > Q^C (mer konkurranse)","Avhenger av pris/kvantum-modell"],

      expl:"Q^S = 3(a−c)/(4b) ≈ 0.75(a−c)/b.\nQ^C = 2(a−c)/(3b) ≈ 0.667(a−c)/b.\n\nQ^S > Q^C. Stackelberg gir mer konkurransedyktig utfall: høyere total output, lavere pris."},
    {type:"mc", q:"Hva er hovedutfallet i standard Bertrand (ubegrenset kapasitet, homogene goder)?",

      expl:"**Bertrand-paradokset**: Prisene kuttes i kappløp til p = MC, null profitt - selv med bare 2 firmaer. Hvis p > MC, kan et firma underby med p−ε og kapre hele markedet. Ekstremt utfall som ikke passer virkeligheten."},
    {type:"mc", q:"Hva kjennetegner Bertrand med kapasitetsbegrensninger?",
      opts:["Pris = MC","Pris settes slik at total markedsetterspørsel = samlet kapasitet K1+K2","Monopolmengder produseres","Kapasitet elimineres fra likevekt"],
      correct:1, src:"Lecture 6 - Bertrand with capacity",
      expl:"Med kapasitetsbegrensninger kan ikke et firma kapre hele markedet ved underbying. Nash-likevekt: p = p(K1+K2), der etterspørsel = total kapasitet. Løser Bertrand-paradokset."},
    {type:"calc", q:"Regneoppgave (Bertrand med kapasitet):\n\nTo firmaer, MC=4, P=220−2Q.\n\n(a) Ubegrenset kapasitet: pris, kvantum, profitt?\n(b) K1=K2=36?",
      src:"Exercise 3 - Oligopolistic markets",
      expl:"**Formler:**\n• Ubegrenset Bertrand: P = MC\n• Med kapasitet: P = P(K1+K2)\n\n**STEG 1 — Ubegrenset (a):**\nP = MC = **4**\n4 = 220 − 2Q → **Q = 108**\nq1 = q2 = **54**\nProfitt: **0**\n\n**STEG 2 — K1=K2=36 (b):**\nK = 72\nP = 220 − 2·72 = 220 − 144 = **76**\nq1 = q2 = **36** (full kapasitet)\nProfitt per firma: (76−4)·36 = 72·36 = **2592**\n\n**Fasit:**\n(a) P=4, q=54, π=0 hver\n(b) P=76, q=36, π=2592 hver\n\nKapasitet løfter prisen fra 4 til 76 og gir reell profitt."},
    {type:"mc", q:"Hva er 'revealed profitability' for Stackelberg-leder?",

      correct:0, src:"Lecture 6",
      expl:"Lederen vet at følgeren bruker samme reaksjonsfunksjon som i Cournot. Hvis lederen velger q1^C, blir utfallet Cournot. At lederen velger noe ANNET betyr at dette MÅ gi minst like høy profitt. Derfor π1^S ≥ π1^C."},
    {type:"mc", q:"Hvilken er IKKE en vanlig innvending mot standard Bertrand?",
      opts:["Urealistisk at flere firmaer ikke senker pris","Urealistisk null profitt for duopoler","Urealistisk at p = MC alltid","Urealistisk at firmaer noen gang konkurrerer på pris"],
      correct:3, src:"Lecture 6",
      expl:"De tre første er klassiske kritikker. Den fjerde er IKKE kritikk - mange bransjer konkurrerer nettopp på pris. Løsninger: differensiering, kollusjon, dynamisk konkurranse, kapasitetsbegrensninger."},
    {type:"mc", q:"I Cournot N-firmas-likevekt, hvilken relasjon gjelder L og HHI?",
      opts:["L = HHI · ε","L = HHI / ε","L = ε / HHI","L uavhengig av HHI"],
      correct:1, src:"Lecture 7, slide 30",
      expl:"Fra Cournot utledes: **L = HHI / ε** (industri-nivå). På firma: L_i = s_i / ε. Markedsmakt ØKER med konsentrasjon og SYNKER med elastisitet."},
    {type:"mc", q:"Hvilken er en KOLLUSIV modell?",

      expl:"Kollusive: Karteller (OPEC). Konkurrerende: Cournot/Bertrand (simultane), Stackelberg (sekvensielle). Karteller er ulovlige i antitrust."},
    {type:"text", q:"Forklar hvorfor Bertrand-utfallet (p=MC) er vanskelig i praksis. Nevn minst 2 løsninger.",
      keywords:["capacity","differentiation","collusion","dynamic","price war","two","firms"],

      expl:"**Urealistisk utfall**:\n• Prediker null profitt med 2 firmaer, men virkelige duopoler tjener profitt\n• Antall firmaer påvirker ikke pris, men empirisk synker priser med flere firmaer\n\n**Løsninger (min 2)**:\n1. **Produktdifferensiering**: Ikke homogene goder, lojalkunder\n2. **Kollusjon**: Implicit eller eksplicit samarbeid\n3. **Dynamisk konkurranse/priskrig**: Frykt for gjengjeldelse i gjentatte spill\n4. **Kapasitetsbegrensninger**: Kan ikke kapre hele markedet, pris stabiliseres"},

      expl:"Mark II (1942): Creative accumulation. Store etablerte selskaper dominerer pga lager av kunnskap, FoU-historie, store ressurser. Høy kumulativitet, lav opportunitet, høy approprierbarhet. Eksempel: farma, halvledere."},
    {type:"mc", q:"Teknologisk regime - hva skiller Mark I vs Mark II?",
      opts:["Skatt","Kumulativitet, opportunitet, approprierbarhet","Geografisk plassering","Regulering"],
      correct:1, src:"Lecture 12, slide 29",
      expl:"Mark I: lav kumulativitet (bredende mønster, drastisk innovasjon), høy opportunitet, lav approprierbarhet (lett imitasjon).\nMark II: høy kumulativitet (dypnende, gradvis), lav opportunitet, høy approprierbarhet (vanskelig imitasjon)."},
    {type:"mc", q:"Silicon Valley er klassisk eksempel på?",
      opts:["Mark II","Mark I (mange entries/exits, creative destruction)","Ingen innovasjon","Kun statlig"],
      correct:1, src:"Lecture 12, slide 30",
      expl:"Silicon Valley: mange entries og exits, startup-økosystem. Drastisk innovasjon erstatter etablerte selskaper. Klassisk Mark I. Andre eksempler: Cambridge (UK) for farma, Dresden for halvledere, Hangzhou for fintech."},
    {type:"mc", q:"'Drastisk' vs 'gradvis' innovasjon?",
      opts:["Teknisk betydning","Drastisk ERSTATTER eksisterende; gradvis forbedrer","Juridisk","Regulatorisk"],
      correct:1, src:"Lecture 12",
      expl:"Drastisk: nytt produkt erstatter gamle (menaced monopolist taper pga replacement av egne produkter). Gradvis: nye produkter utfyller/forbedrer (monopolist har mer å tape fordi kan beholde markedsandel ved å innovere)."},
    {type:"mc", q:"Under drastisk innovasjon + menaced monopolist, hvem har mest insentiv?",
      opts:["Monopolisten (replacement)","Entrantene (mindre å tape)","Ingen","Staten"],
      correct:1, src:"Lecture 12, slide 19",
      expl:"Ved drastisk innovasjon fortrenger nye produkter gamle. Monopolisten 'erstatter seg selv' - replacement effect - mindre å vinne. Entrantene har null profitt å miste - mer å vinne. Mark I-dynamikk."},
    {type:"mc", q:"Under gradvis innovasjon + menaced monopolist, hvem har mest insentiv?",
      opts:["Entrantene","Monopolisten (mer å tape ved missed innovasjon)","Ingen","Staten"],
      correct:1, src:"Lecture 12, slide 19",
      expl:"Ved gradvis innovasjon beholder monopolisten markedsposisjonen hvis hen innoverer, men mister kundene hvis hen ikke gjør det. 'More to lose'. Mark II-dynamikk støtter stor bedrifts dominans."},
    {type:"mc", q:"IKKE en typisk innovasjonsmåling?",
      opts:["FoU-utgifter","Antall patenter","Nye produktlanseringer","Bedriftens navneskift"],
      correct:3, src:"Lecture 12",
      expl:"Typiske mål: FoU (input), patenter (output med kvalitetsjustering), nye produkter (kommersialisert output), prosessforbedringer. Navneskift er irrelevant - markedstiltak ikke innovasjon."},
    {type:"mc", q:"Hva er 'process innovation' (i Replacement-modellen)?",
      opts:["Nye produkter","Reduksjon av marginalkostnader","Markedsføring","Logistikk"],
      correct:1, src:"Lecture 12, slide 20",
      expl:"Process innovation (i modellen): reduserer MC fra c̄ til c. Gir variabel profitt vπ̄ (før) til vπ (etter, innovatør). Modell sammenligner reward under monopol vs konkurranse."},
    {type:"mc", q:"Er Replacement Effect og Schumpeter Mark I komplementære?",
      opts:["Motstridende","Komplementære: Mark I samler inn drastisk + menaced, Replacement statisk","Identiske","Uavhengige"],
      correct:1, src:"Lecture 12, slide 28",
      expl:"Replacement Effect er STATISK - sammenligner insentiv i monopol vs konkurranse i ett bilde. Mark I legger til DYNAMIKK - entreprenører fortrenger. Begge støtter at drastisk innovasjon er mer sannsynlig utenfor monopol."},
    {type:"mc", q:"Viktigst praktisk implikasjon av Mark II?",
      opts:["Må bryte opp store firmaer","Store bedrifter er viktige for innovasjon; antitrust må balansere","Kun startups matter","Ingen implikasjon"],
      correct:1, src:"Lecture 12 + Lecture 15",
      expl:"Mark II: store bedrifter driver innovasjon i noen teknologier. Dette har antitrust-implikasjoner - aggressivt å bryte opp kan skade innovasjon. Lecture 15 (antitrust) diskuterer hvordan konkurranseanalyse må balansere statisk vs dynamisk effektivitet."},
    {type:"mc", q:"Hva betyr 'appropriability'?",
      opts:["Passende bruk","Grad firmaet kan APPROPRIERE (beholde) fordelene av sin innovasjon - beskyttelse mot imitasjon","Juridisk status","Markedsandel"],
      correct:1, src:"Lecture 12, slide 29",
      expl:"Appropriability = hvor godt kan innovatoren beholde gevinsten? Høy = vanskelig imitasjon (patenter sterke, tacit knowledge). Lav = lett imitasjon (kopiert raskt). Mark II har HØY appropriability, Mark I LAV."},
    {type:"text", q:"Forklar kort replacement effect og menaced monopolist. Når forventer hver modell mer innovasjon under konkurranse vs monopol?",
      keywords:["replacement","menaced","competition","monopoly","gain","lose","incentive","drastic","gradual"],
      src:"Lecture 12, slides 19-24",
      expl:"**Replacement Effect (Arrow)**:\n• Monopolist erstatter seg selv ved innovasjon - mindre å vinne\n• Konkurrerende firma har null profitt - mer å vinne\n• Prediker: MER innovasjon i konkurranse\n\n**Menaced Monopolist**:\n• Entry-trussel; monopolist kan tape markedet om hen ikke innoverer\n• Ved DRASTISK innovasjon: monopolist mister markedet uansett, mindre insentiv (som Arrow) → entrants mest innovasjon\n• Ved GRADVIS innovasjon: 'more to lose'; monopolist innoverer for å beholde posisjon → monopolist mest innovasjon\n\nBegge gjelder, men teknologiens type avgjør hvilken passer best. Kobler til Schumpeter Mark I (drastisk) vs Mark II (gradvis)."},
  ]
},
"13_Alliances": {
  title: "Lecture 13: Interfirm Alliances",
  questions: [
    {type:"mc", q:"Forskjell strategisk allianse vs joint venture?",

      correct:1, src:"Lecture 13, slide 22",
      expl:"• Strategisk allianse: samarbeid, koordinering, deling uten ny enhet.\n• Joint venture: ny uavhengig organisasjon eies felles.\n\nBegge: samarbeid for spesifikt mål uten full fusjon."},
    {type:"mc", q:"Hva er equity alliance?",
      opts:["Uten eierskap","JV eller minoritetseierskap i partner","Full fusjon","Kontraktsavtale"],
      correct:1, src:"Lecture 13, slide 11-14",
      expl:"Equity alliance = involverer eierskapsutveksling. Eksempler: JV (felles eid ny enhet), minoritetsandel (Tencent kjøpte 5% i Tesla 2017). Non-equity: lisensiering, franchising, konsortier."},
    {type:"mc", q:"Faktorer som fører til allianser/JV?",
      opts:["Kun skatt","Impediments til kontrakter, relation-specific assets, komplementaritet, informasjon, transitorisk mulighet","Kun juridisk","Kun marked"],
      correct:1, src:"Lecture 13, slide 25",
      expl:"(1) Impediments til komprehensive kontrakter. (2) Relation-specific assets fra begge. (3) Komplementaritet av ressurser. (4) Informasjon/kunnskapsdeling. (5) Transitorisk samarbeidsmulighet."},
    {type:"mc", q:"Typer av allianser?",
      opts:["Kun horisontale","Horisontale (samme industri), Laterale (ulike), Vertikale (verdikjede)","Kun vertikale","Kun laterale"],
      correct:1, src:"Lecture 13, slide 24",
      expl:"• Horisontale: samme industri (konkurrenter i allianse).\n• Laterale: ulike industrier.\n• Vertikale: ulike stadier i samme verdikjede.\n\nAlle kan inngås som formelle eller uformelle avtaler."},
    {type:"mc", q:"Hva er konsortium?",
      opts:["Full fusjon","Midlertidig allianse av uavhengige org for spesifikt mål","Statlig byrå","Ett firma flere divisjoner"],
      correct:1, src:"Lecture 13, slide 21",
      expl:"Konsortium = midlertidig. Partene forblir juridisk separate men samarbeider via kontrakt. Eksempler: ITER (kjernefusjon EU/US/Russland/Kina/Japan/India), forskningskonsortier."},
    {type:"mc", q:"Hva baserer allianser seg på (vs arm's length)?",
      opts:["Strengere kontrakter","Tillit, gjensidighet, samarbeid, informasjonsdeling","Mindre interaksjon","Kortere horisont"],
      correct:1, src:"Lecture 13, slide 24",
      expl:"Allianser: TILLIT, gjensidighet, samarbeid, informasjonsdeling. Arm's length-kontrakter: formell, transaksjonsbasert, minimal informasjonsutveksling. Tvister: allianser forhandles, arm's length prosederes."},
    {type:"mc", q:"Ulempe ved allianser?",
      opts:["Alltid lønnsomt","Tap av kontroll over info, IP-problemer, agency, koordinering","Ingen","Eliminerer konkurranse"],
      correct:1, src:"Lecture 13, slide 26",
      expl:"Ulemper: (1) Tap av kontroll over info. (2) Intensiv kunnskapsdeling. (3) IP-beskyttelsesmekanismer kan være ineffektive. (4) Agency- og influence-kostnader. (5) Koordineringsvansker. (6) Ingen formelle beslutnings-/tvisteløsningsmekanismer."},
    {type:"mc", q:"Hva er 'hostage theory' i allianser?",
      opts:["Juridisk lovlig kidnapping","Mekanisme: hver part setter noe verdifullt på spill for å signalisere forpliktelse","Staten tar gissel","Uten kontrakt"],
      correct:1, src:"Lecture 13, slide 42",
      expl:"Hostage theory: reduserer opportunisme ved at hver part INVESTERER noe verdifullt som de ville tape ved defeksjon. Gissel = ikke fysisk, men en relation-specific investment. Skaper gjensidig sårbarhet og troverdighet."},
    {type:"mc", q:"Hvorfor fungerer samarbeid i gjentatte relasjoner?",
      opts:["Alltid","Verdsetter fremtiden og kan troverdig straffe defeksjon","Juridisk tvang","Regulering"],
      correct:1, src:"Lecture 13, slide 42",
      expl:"Game theory: i enkeltspill er defeksjon rasjonell (prisoner's dilemma). Men i gjentatte spill kan cooperation emerge og persist hvis: (1) Høy fremtidsverdsetting. (2) Troverdig straff ved defeksjon (f.eks. tit-for-tat)."},
    {type:"mc", q:"Alliansestrategi for internasjonalisering?",
      opts:["Alltid full etablering","Allianser fordeles informasjon, kunnskap og kontekstuell tilpasning","Alltid joint venture","Kun franchise"],
      correct:1, src:"Lecture 13, slide 25",
      expl:"Ved internasjonalisering: allianser gir lokal kunnskap, informasjon om kontekst, og tilpasning. Lokal partner vet regulering, kultur, nettverk - den innflyttede partner bidrar med teknologi/kapital. Klassisk win-win."},
    {type:"mc", q:"Ikke-equity alliance?",
      opts:["JV","Lisensiering, franchising, strategiske allianser (kontrakt, ikke eierskap)","Minoritetseierskap","Full fusjon"],
      correct:1, src:"Lecture 13, slide 11",
      expl:"Ikke-equity: kontraktsavtale uten eierskapsutveksling. Eksempler: lisensiering (IP-rett mot royalty), franchising (merkevare + modell), konsortier, strategiske allianser. Forpliktelsen er ressurser/ferdigheter, ikke kapital."},
    {type:"mc", q:"Hva betyr transitorisk samarbeidsmulighet?",
      opts:["Permanent","Kortsiktig mulighet (prosjekt, teknologivindu) som ikke rettferdiggjør full fusjon","Juridisk pålagt","Evigvarende"],
      correct:1, src:"Lecture 13, slide 25",
      expl:"Transitorisk: samarbeidet er TIDSBEGRENSET til en spesifikk mulighet - et prosjekt, en teknologirace, en markedsinngang. Full fusjon/integrasjon er overkill. Allianser/JV passer perfekt for slike diskrete mål."},
    {type:"mc", q:"Joint Research and Development Act (1984) tillater?",
      opts:["Fusjoner","Domestiske/utenlandske firmaer delta i felles grunnforskning uten antitrust-frykt","Karteller","Alle samarbeid"],
      correct:1, src:"Lecture 13, slide 21",
      expl:"USAs JRDA tillater forskningskonsortier uten antitrust-skrekk - anerkjent at kostbar R&D ofte overstiger ett firmas kapasitet. Tilsvarende i EU og Japan. Begrunnelse: dynamisk effektivitet (innovasjon) vs statisk konkurranseeffektivitet."},
    {type:"text", q:"Hvorfor velger firmaer allianser/JV fremfor enten marked eller full integrasjon?",
      keywords:["intermediate","flexibility","contracts","relation-specific","both parties","trust","learning"],
      src:"Lecture 13",
      expl:"**Intermediate forms** fyller gap mellom marked (arm's length) og hierarki (integrasjon):\n\n**Grunner til allianser/JV**:\n1. **Impediments til komplette kontrakter**: Marked fungerer ikke godt, men full fusjon er overkill.\n2. **Relation-specific assets FRA BEGGE SIDER**: Begge investerer, skaper gjensidig avhengighet (hostage).\n3. **Komplementaritet**: Hver part har unike ressurser - ingen kan gjøre det alene.\n4. **Info/kunnskapsdeling**: Samarbeid muliggjør læring.\n5. **Transitorisk mulighet**: Kortsiktig prosjekt rettferdiggjør ikke permanent integrasjon.\n\nFordel: fleksibilitet + samarbeid uten å gi opp autonomi. Ulempe: koordineringskostnader og IP-risiko."},
    {type:"mc", q:"Eksempel på horisontal allianse?",
      opts:["Bilselskap + leverandør","To flyselskap i Star Alliance","Produsent + distributør","Bank + teknologiselskap"],
      correct:1, src:"Lecture 13, slide 24",
      expl:"Star Alliance = flyselskaper i SAMME industri samarbeider om ruter, miles, lounges. Horisontal. Bilselskap+leverandør=vertikal. Produsent+distributør=vertikal. Bank+tech=lateral (ulike industrier)."},
  ]
},
"14_Regulation": {
  title: "Lecture 14: Natural Monopoly Regulation & SOEs",
  questions: [
    {type:"mc", q:"To hovedrespons på naturlig monopol-markedsvikt?",
      opts:["Antitrust, miljøpolitikk","SOEs (State-Owned Enterprises) og monopolregulering","Ignorere, skatt","Fusjoner, karteller"],
      correct:1, src:"Lecture 14",
      expl:"Naturlig monopol → staten intervenerer via:\n(1) **SOEs**: staten eier firmaet direkte.\n(2) **Monopolregulering**: private firmaet, regulert pris/investering.\n\nAntitrust adresserer misbruk av markedsmakt; miljøpolitikk eksternaliteter."},
    {type:"mc", q:"Natural monopoly model med single produkt?",
      opts:["TC = cQ²","TC = F + cQ; AC = F/Q + c; MC = c","TC = F/Q","TC = Q"],
      correct:1, src:"Lecture 14",
      expl:"Forenklet modell: TC = F + cQ (faste + variable).\nAC = F/Q + c (synker med Q → skaleøkonomier).\nMC = c (konstant).\n\nSkaleøkonomier garanterer cost subadditivity for ett-produktfall."},
    {type:"mc", q:"Second-best scenario ved regulering?",
      opts:["Pris = MC","Pris = AC (break-even, gir Q mellom monopol og p.k.)","Pris = monopolpris","Ingen pris"],
      correct:1, src:"Lecture 14",
      expl:"**Second-best**: regulator maksimerer velferd med π ≥ 0.\n• Løsning: p̂ = AC(Q̂) der etterspørsel møter AC\n• Q* > Q̂ > Q_MON; p* < p̂ < p_MON\n\nKan ikke få first-best (p=MC) fordi da får firmaet tap (p<AC). Break-even-betingelsen bestemmer."},
    {type:"mc", q:"First-best med subsidie?",
      opts:["T = p","T = MC, subsidie S = F","T = 0","T = AC"],
      correct:1, src:"Lecture 14",
      expl:"**First-best med subsidie**:\n• Sett unitary rate T = MC\n• Subsidie S = F (dekker faste kostnader)\n• Firm break-even: R = T·Q + S = MC·Q + F\n\nIdeell effektivitet, men problemer: politisk bruk av subsidier, soft budget constraint, svak produktivitetsinsentiv."},
    {type:"mc", q:"Two-part tariff?",
      opts:["Kun volum","Unitary rate T=MC + årlig access fee A","Kun access","Kun subsidie"],
      correct:1, src:"Lecture 14",
      expl:"**Two-part tariff** (C):\n• T = MC (volumbasert rate)\n• A = access fee (årlig)\n  - N kunder med høyere inntekt: A = F/N\n  - Lavere inntekt: A = 0\n• Revenues (T·Q + N·A) = TC (MC·Q + F)\n\nFordel: break-even uten subsidie, mer transparent. Bare mulig for tilkoplede brukere (vann, strøm)."},
    {type:"mc", q:"Hva er 'tariff components'?",
      opts:["Kun pris","T (unitary rate), S (subsidie), A (access fee)","Kun skatt","Kun lønn"],
      correct:1, src:"Lecture 14",
      expl:"Regulerte tariffer kan ha 3 komponenter:\n• T = unitary usage rate (€/kWh, €/m³)\n• S = subsidie/statlig transfer (for å dekke faste)\n• A = access fixed fee (€/kunde·år)\n\nKombinasjoner gir ulike regulerings-scenarier (first-best w/ subsidie, two-part, osv.)."},
    {type:"mc", q:"Hva er 'patronage' i SOE-kontekst?",
      opts:["Kundeservice","Politisk bruk av SOE til egen gevinst (jobbtildeling, favoriserte kontrakter)","Regulering","Uavhengighet"],
      correct:1, src:"Lecture 14",
      expl:"Patronage = politikere bruker SOEs for politisk vinning (gi jobber, kontrakter, favorer til støttespillere). Dette er en kjent svakhet ved statlig eierskap. Privatisering + regulering var svar i mange land fra 1980-tallet."},
    {type:"mc", q:"Trend for SOEs i høyinntektsøkonomier?",
      opts:["Kontinuerlig vekst","Privatisering + regulering fra 1980-tallet, men 'recent awakening' pga kriser","Fullstendig forsvunnet","Alltid stabilt"],
      correct:1, src:"Lecture 14",
      expl:"Historisk: 1980-2030-trend. Stor privatiseringsbølge (1980-2000s) pga patronage/ineffektivitet. Siden 2020 'awakening': pandemi, krig, geopolitiske kriser har gjort statlig eierskap mer attraktivt i enkelte sektorer."},
    {type:"mc", q:"Hva er 'soft budget constraint'?",
      opts:["Strikt budsjett","Firma kan regne med at tap dekkes av staten; svekker kostnadsdisiplin","Ingen budsjett","Eksternt revidert"],
      correct:1, src:"Lecture 14",
      expl:"Soft budget constraint: firmaet (typisk SOE eller subsidiert) VET at staten dekker tap. Dette reduserer insentiv til kostnadskontroll - jo verre økonomi, jo mer subsidie. Klassisk kritikk av SOE og first-best med fast subsidie."},
    {type:"mc", q:"Agency-problemer i naturlig monopoli?",
      opts:["Forsvinner med regulering","Eksisterer fortsatt (skjult handling, asymmetrisk info)","Kun privat","Irrelevant"],
      correct:1, src:"Lecture 14",
      expl:"Agency-problemer vedvarer under alle regulerings-/eierskapsformer:\n• SOE: politikere (prinsipal) vs management (agent)\n• Regulert privat: regulator vs management\n\nAlltid vanskelig å overvåke faktisk innsats/effektivitet. Dette er en del av begrunnelsen for å innføre insentivbaserte reguleringer."},
    {type:"mc", q:"Hvorfor kan regulator alternativet til SOE?",
      opts:["Kan ikke","Regulering gir privat effektivitet + offentlig kontroll over pris; unngår patronage","Regulering billigere","Lovforbud"],
      correct:1, src:"Lecture 14",
      expl:"Regulering av private monopolist: beholder private insentiver til effektivitet (profittmaksimering innenfor rammer), men kontrollerer pris og tilgang. Kan unngå politisk misbruk som rammer SOEs. Men regulator kan selv rammes av regulatory capture."},
    {type:"mc", q:"Eksempel sektor med two-part tariff?",
      opts:["Ingen","Vann, strøm, gass, telekom (tilkoblede brukere)","Kafeer","Restauranter"],
      correct:1, src:"Lecture 14",
      expl:"Two-part tariff krever tilkoblede brukere (identifiserbare kunder med permanent tilkobling). Eksempler: vann, strøm, gass, telekom, fiber. Fungerer ikke for åpne markeder hvor alle kan handle."},
    {type:"mc", q:"Hvorfor er subsidier problematiske?",
      opts:["Ikke problematiske","Politisk bruk, soft budget, svake produktivitetsinsentiver","Alltid ulovlige","For små beløp"],
      correct:1, src:"Lecture 14",
      expl:"Subsidieproblemer: (1) Politisk bruk i forhandlinger. (2) Soft budget constraint - firmaet regner med subsidie. (3) Svekker innsatsen for effektivitet. Eksempel: bypublic transport, regionale jernbaner."},
    {type:"text", q:"Forklar trade-off mellom first-best (T=MC+S) og second-best (p=AC) regulering.",
      keywords:["first-best","second-best","subsidy","break-even","MC","AC","efficiency","deadweight"],
      src:"Lecture 14",
      expl:"**First-best** (T=MC + subsidie S=F):\n+ Allokativ effektivitet (p=MC, ingen DWL)\n+ Høyest mulig sosialt velferd\n- Krever offentlig subsidie (skatter)\n- Soft budget constraint, svake insentiver\n- Politisk misbruk\n\n**Second-best** (p=AC, break-even):\n+ Selvfinansierende (ingen skatter)\n+ Ingen subsidiemisbruk\n+ Bedre insentiver til effektivitet\n- Allokativ ineffektivitet (p>MC, liten DWL)\n- Q < Q_optimal\n\n**Two-part tariff** kan kombinere fordeler: T=MC (optimal for volum) + A (dekker faste uten skatter). Men krever tilkoblede brukere."},
    {type:"mc", q:"Hvilken markedssvikt matcher med SOE/regulering?",
      opts:["Abusive market power","Naturlig monopol","Miljøeksternaliteter","Vekst-hindringer"],
      correct:1, src:"Lecture 14",
      expl:"• Abusive market power → antitrust\n• NATURLIG MONOPOL → SOE/regulering\n• Miljøeksternaliteter → miljøpolitikk\n• Vekst-hindringer → industriell/innovasjonspolitikk"},
  ]
},

    {type:"mc", q:"EU-sonerre for post-merger HHI?",

// ============================================================
// APPLICATION LOGIC
// ============================================================

const app = document.getElementById('app');
let state = {
  screen: 'home', // home, quiz, results
  topic: null,    // "all" or topic key
  questions: [],  // selected questions for current quiz
  current: 0,     // current question index
  answers: []     // user's answers
};

// Shuffle array (Fisher-Yates)
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// Shuffle options but remember correct index
function shuffleOptions(q) {
  if (q.type !== 'mc') return q;
  const indexed = q.opts.map((opt, i) => ({opt, isCorrect: i === q.correct}));
  const shuffled = shuffle(indexed);
  return {
    ...q,
    opts: shuffled.map(x => x.opt),
    correct: shuffled.findIndex(x => x.isCorrect)
  };
}

function pickQuestions(topicKey, n) {
  const qs = QUESTIONS[topicKey].questions;
  const shuffled = shuffle(qs);
  const selected = shuffled.slice(0, Math.min(n, qs.length));
  return selected.map(q => ({...shuffleOptions(q), _topicKey: topicKey, _topicTitle: QUESTIONS[topicKey].title}));
}

function startQuiz(topicKey) {
  if (topicKey === 'all') {
    // 5 from each topic, shuffled
    let all = [];
    Object.keys(QUESTIONS).forEach(k => {
      all = all.concat(pickQuestions(k, 5));
    });
    state.questions = shuffle(all);
    state.topic = 'all';
  } else {
    state.questions = pickQuestions(topicKey, 15);
    state.topic = topicKey;
  }
  state.current = 0;
  state.answers = state.questions.map(() => ({submitted: false, answer: null, textValue: ''}));
  state.screen = 'quiz';
  render();
}

function renderHome() {
  let html = `
    <h1>BIE Quiz</h1>
    <p class="subtitle">Business and Industrial Economics - Velg quiz-type</p>
    <button class="topic-btn all" onclick="startQuiz('all')">
      🎯 Samlet quiz (5 spørsmål fra hver forelesning - totalt ${Object.keys(QUESTIONS).length * 5} spørsmål)
    </button>
    <h2 style="margin-top:25px;">Eller velg en spesifikk forelesning (15 spørsmål):</h2>
  `;
  Object.keys(QUESTIONS).forEach(k => {
    const topic = QUESTIONS[k];
    html += `<button class="topic-btn" onclick="startQuiz('${k}')">${topic.title} <span style="color:#666;font-size:13px;">(${topic.questions.length} tilgjengelige)</span></button>`;
  });
  app.innerHTML = html;
}

function renderQuiz() {
  const q = state.questions[state.current];
  const ans = state.answers[state.current];
  const total = state.questions.length;
  const progress = ((state.current + 1) / total) * 100;

  let typeBadge = '';
  if (q.type === 'calc') typeBadge = '<span class="q-type-badge calc">REGNING</span>';
  else if (q.type === 'text') typeBadge = '<span class="q-type-badge text">TEKSTSVAR</span>';
  else typeBadge = '<span class="q-type-badge">FLERVALG</span>';

  let html = `
    <button class="back-btn" onclick="confirmHome()">← Tilbake til meny</button>
    <div class="progress"><div class="progress-bar" style="width:${progress}%"></div></div>
    <div class="question-box">
      <div class="q-header">
        <div>
          <span class="q-num">Spørsmål ${state.current + 1} av ${total}</span>
          ${typeBadge}
        </div>
        <span class="q-topic">${q._topicTitle.split(':')[0]}</span>
      </div>
      <div class="q-text">${escapeHtml(q.q)}</div>
  `;

  if (q.type === 'mc') {
    html += '<div class="options">';
    q.opts.forEach((opt, i) => {
      let cls = 'option';
      if (ans.submitted) {
        if (i === q.correct) cls += ' correct-reveal';
        if (ans.answer === i && i !== q.correct) cls += ' wrong';
        if (ans.answer === i && i === q.correct) cls += ' correct';
      } else if (ans.answer === i) {
        cls += ' selected';
      }
      html += `<div class="${cls}" onclick="selectOption(${i})">${String.fromCharCode(65+i)}. ${escapeHtml(opt)}</div>`;
    });
    html += '</div>';
  } else {
    // text or calc - textarea
    const guidance = q.type === 'calc'
      ? 'Vis steg-for-steg: formler → innsetting → beregning → fasit.'
      : 'Skriv et kort tekstsvar. Du får detaljert forklaring etterpå.';
    html += `<div class="text-guidance">💡 ${guidance}</div>`;
    html += `<textarea id="textAns" onchange="saveText(this.value)" ${ans.submitted ? 'disabled' : ''} placeholder="Skriv svaret ditt her...">${escapeHtml(ans.textValue || '')}</textarea>`;
  }

  // Feedback after submit
  if (ans.submitted) {
    if (q.type === 'mc') {
      const isCorrect = ans.answer === q.correct;
      html += `<div class="feedback ${isCorrect ? 'correct' : 'wrong'}">
        <span class="feedback-label">${isCorrect ? '✅ Riktig!' : '❌ Feil. Riktig svar: ' + String.fromCharCode(65+q.correct)}</span>
        ${escapeHtml(q.expl).replace(/\n/g, '<br>')}
        <div class="source">Kilde: ${escapeHtml(q.src)}</div>
      </div>`;
    } else {
      html += `<div class="feedback text-answer">
        <span class="feedback-label">📝 Fasit / Modellsvar:</span>
        ${escapeHtml(q.expl).replace(/\n/g, '<br>')}
        <div class="source">Kilde: ${escapeHtml(q.src)}</div>
      </div>`;
    }
  }

  // Submit button (if not submitted)
  if (!ans.submitted) {
    const canSubmit = q.type === 'mc' ? ans.answer !== null : (ans.textValue && ans.textValue.trim().length > 0);
    html += `<button class="btn-submit" onclick="submitAnswer()" ${canSubmit ? '' : 'disabled'}>Send inn svar</button>`;
  }

  html += '</div>'; // question-box

  // Navigation
  html += '<div class="nav">';
  html += `<button class="btn-secondary" onclick="prev()" ${state.current === 0 ? 'disabled' : ''}>← Forrige</button>`;
  if (state.current < total - 1) {
    html += `<button class="btn-primary" onclick="next()">Neste →</button>`;
  } else {
    // Last question - show finish button
    const allSubmitted = state.answers.every(a => a.submitted);
    html += `<button class="btn-finish" onclick="finishQuiz()" ${allSubmitted ? '' : ''}>🏁 Fullfør quiz</button>`;
  }
  html += '</div>';

  app.innerHTML = html;
}

function renderResults() {
  // Calculate score
  let mcCorrect = 0, mcTotal = 0, textCount = 0;
  state.answers.forEach((a, i) => {
    const q = state.questions[i];
    if (q.type === 'mc') {
      mcTotal++;
      if (a.answer === q.correct) mcCorrect++;
    } else {
      textCount++;
    }
  });

  const scorePercent = mcTotal > 0 ? Math.round((mcCorrect / mcTotal) * 100) : 0;

  let html = `
    <h1>🏁 Quiz ferdig!</h1>
    <div class="score-box">
      <h2>Din score</h2>
      <div class="score-big">${mcCorrect} / ${mcTotal}</div>
      <div style="font-size:20px;">${scorePercent}% riktig på flervalg</div>
      ${textCount > 0 ? `<div style="margin-top:15px;font-size:14px;opacity:0.9;">+ ${textCount} tekstsvar (vurder selv mot fasiten)</div>` : ''}
    </div>
    <h2>Gjennomgang av alle spørsmål:</h2>
  `;

  state.questions.forEach((q, i) => {
    const a = state.answers[i];
    let cls = 'review-item ';
    let status = '';
    if (q.type === 'mc') {
      if (a.answer === q.correct) { cls += 'correct-r'; status = '✅ Riktig'; }
      else { cls += 'wrong-r'; status = '❌ Feil'; }
    } else {
      cls += 'text-r'; status = '📝 Tekstsvar';
    }
    html += `<div class="${cls}">
      <div style="font-size:13px;color:#666;margin-bottom:5px;">${escapeHtml(q._topicTitle)} • ${status}</div>
      <div style="font-weight:500;margin-bottom:8px;">${i+1}. ${escapeHtml(q.q).substring(0, 120)}${q.q.length > 120 ? '...' : ''}</div>`;
    if (q.type === 'mc') {
      html += `<div style="font-size:13px;">Ditt svar: <b>${a.answer !== null ? String.fromCharCode(65+a.answer) : '(ikke besvart)'}</b> | Riktig: <b>${String.fromCharCode(65+q.correct)}</b></div>`;
    }
    html += '</div>';
  });

  html += `<div class="nav"><button class="btn-primary" onclick="goHome()">🔄 Ny quiz</button></div>`;
  app.innerHTML = html;
  window.scrollTo(0, 0);
}

function selectOption(i) {
  if (state.answers[state.current].submitted) return;
  state.answers[state.current].answer = i;
  render();
}

function saveText(val) {
  state.answers[state.current].textValue = val;
  // update submit button state
  const btn = document.querySelector('.btn-submit');
  if (btn) btn.disabled = !val || !val.trim();
}

function submitAnswer() {
  const q = state.questions[state.current];
  const a = state.answers[state.current];
  if (q.type !== 'mc') {
    // save current textarea value
    const ta = document.getElementById('textAns');
    if (ta) a.textValue = ta.value;
    if (!a.textValue || !a.textValue.trim()) return;
  } else {
    if (a.answer === null) return;
  }
  a.submitted = true;
  render();
}

function next() {
  if (state.current < state.questions.length - 1) {
    state.current++;
    render();
  }
}

function prev() {
  if (state.current > 0) {
    state.current--;
    render();
  }
}

function finishQuiz() {
  state.screen = 'results';
  render();
}

function goHome() {
  state.screen = 'home';
  state.topic = null;
  state.questions = [];
  state.current = 0;
  state.answers = [];
  render();
}

function confirmHome() {
  if (confirm('Er du sikker? Fremgangen din vil gå tapt.')) goHome();
}

function escapeHtml(s) {
  if (s === null || s === undefined) return '';
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;');
}

function render() {
  if (state.screen === 'home') renderHome();
  else if (state.screen === 'quiz') renderQuiz();
  else if (state.screen === 'results') renderResults();
}

render();
</script>
